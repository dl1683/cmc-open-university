<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Topic — CMC Open University</title>
  <meta name="description" content="Free, visual computer-science education: every algorithm animated, every step explained.">
  <meta name="theme-color" content="#1a1a2e">

  <!-- Open Graph -->
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="CMC Open University">
  <meta property="og:title" content="CMC Open University">
  <meta property="og:description" content="Free, visual computer-science education: every algorithm animated, every step explained.">
  <meta property="og:url" content="https://dl1683.github.io/cmc-open-university/">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="CMC Open University">
  <meta name="twitter:description" content="Free, visual computer-science education: every algorithm animated, every step explained.">

  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles/site.css">
</head>
<body data-page="topic">
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="topic-layout" data-page="topic">
    <nav class="topic-nav" data-topic-nav aria-label="All topics">
      <a class="home-link" href="./index.html">← All topics</a>
    </nav>

    <main id="main" class="topic-main">
      <header class="topic-header">
        <div class="header-row">
          <h1 data-topic-title>Loading…</h1>
          <div class="header-actions">
            <a class="btn btn-secondary" href="https://github.com/dl1683/cmc-open-university" target="_blank" rel="noopener noreferrer">Want to contribute? Make changes on GitHub</a>
            <button class="btn" data-theme-toggle aria-label="Toggle dark or light theme">◐ Theme</button>
          </div>
        </div>
        <p class="topic-summary" data-topic-summary></p>
        <p class="topic-progress" data-topic-progress>Not started yet.</p>
        <div class="link-chips" data-topic-links></div>
      </header>

      <section class="topic-context" data-topic-context hidden></section>
      <form class="controls" data-topic-controls></form>
      <p class="error-box" data-error hidden></p>

      <section class="learn-grid">
        <div class="vis-stage">
          <div class="vis-explanation">
            <p class="explanation" data-explanation aria-live="polite"></p>
            <p class="invariant" data-invariant hidden></p>
          </div>
          <div class="vis-panel" data-visualization aria-live="off"></div>
        </div>
        <div class="player-bar">
          <div class="player-controls" data-player-controls>
            <button class="btn" data-action="reset" aria-label="Back to first step">⏮ Reset</button>
            <button class="btn" data-action="prev" aria-label="Previous step">◀ Prev</button>
            <button class="btn btn-primary" data-action="toggle" aria-pressed="false">▶ Play</button>
            <button class="btn" data-action="next" aria-label="Next step">Next ▶</button>
            <label class="speed-label">Speed
              <select data-speed>
                <option value="0.5">0.5× (slowest)</option>
                <option value="1" selected>1× (reading pace)</option>
                <option value="2">2×</option>
                <option value="4">4×</option>
                <option value="8">8× (skim)</option>
              </select>
            </label>
          </div>
          <div class="progress-area">
            <p class="progress-text" data-progress-text>Step 1</p>
            <input class="step-slider" type="range" min="0" max="0" value="0" data-slider aria-label="Step position">
          </div>
          <div class="export-area">
            <label class="speed-label">Export at
              <select data-export-speed>
                <option value="1" selected>1×</option>
                <option value="2">2×</option>
                <option value="4">4×</option>
              </select>
            </label>
            <button class="btn" data-action="export">⬇ Export video</button>
          </div>
        </div>
        <aside class="frame-log-panel">
          <div class="learn-tools">
            <label class="study-control">
              <input type="checkbox" data-auto-compact-notes checked />
              <span>Auto compact study notes</span>
            </label>
          </div>
          <section class="frame-log" aria-live="polite">
            <h2 class="frame-log-title">Frame log</h2>
            <ul class="frame-log-list" data-frame-log></ul>
          </section>
        </aside>
        <p class="fine-print">Keyboard: ←/→ step, space plays.</p>
      </section>

      <section class="study" data-topic-article hidden>
        <h2 class="study-title">Study notes</h2>
      </section>
    </main>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
